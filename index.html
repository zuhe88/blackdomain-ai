<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACKDOMAIN AI 黑域AI</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei",sans-serif;
  background:#030303;
  color:#fff;
}
.hero{
  min-height:100vh;
  padding:40px 20px;
  background:
    radial-gradient(circle at 75% 30%,rgba(245,197,66,.35),transparent 28%),
    linear-gradient(135deg,#000,#080808 55%,#111);
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  max-width:980px;
  width:100%;
  border:1px solid rgba(245,197,66,.45);
  border-radius:28px;
  padding:50px 35px;
  background:rgba(10,10,10,.86);
  box-shadow:0 0 40px rgba(245,197,66,.18);
}
.logo{
  color:#f5c542;
  letter-spacing:3px;
  font-weight:bold;
}
h1{
  font-size:56px;
  margin:20px 0 10px;
  background:linear-gradient(90deg,#fff,#f5c542);
  -webkit-background-clip:text;
  color:transparent;
}
h2{
  font-size:34px;
  color:#f5c542;
  margin:0 0 25px;
}
.desc{
  font-size:21px;
  line-height:1.8;
  color:#ddd;
}
.features{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin:35px 0;
}
.card{
  border:1px solid rgba(245,197,66,.35);
  border-radius:18px;
  padding:20px;
  background:linear-gradient(180deg,#151515,#090909);
}
.card b{
  color:#f5c542;
  font-size:20px;
}
.card p{
  color:#aaa;
  font-size:15px;
}
.btn{
  display:inline-block;
  margin-top:10px;
  padding:18px 36px;
  background:linear-gradient(90deg,#06C755,#00a844);
  color:white;
  text-decoration:none;
  border-radius:14px;
  font-size:24px;
  font-weight:bold;
  box-shadow:0 0 22px rgba(6,199,85,.45);
}
.notice{
  margin-top:25px;
  color:#999;
  font-size:14px;
}
.footer{
  text-align:center;
  padding:25px;
  color:#777;
  border-top:1px solid #222;
}
</style>
</head>
<body>

<section class="hero">
  <div class="box">
    <div class="logo">NEXT GENERATION AI SYSTEM</div>

    <h1>BLACKDOMAIN AI</h1>
    <h2>黑域AI智能系統</h2>

      打造更快、更穩、更直覺的智能資訊平台。
    </p>

    <div class="features">
      <div class="card">
        <b>AI智能分析</b>
        <p>多模型交叉運算，輔助判斷更清楚。</p>
      </div>

      <div class="card">
        <b>即時資訊</b>
        <p>整合即時數據，快速掌握最新狀態。</p>
      </div>

      <div class="card">
        <b>LINE整合</b>
        <p>加入官方LINE，快速取得功能資訊。</p>
      </div>

      <div class="card">
        <b>黑金科技風</b>
        <p>專屬品牌形象，提升信任與質感。</p>
      </div>
    </div>

    <a class="btn" href="https://line.me/R/ti/p/@893jrweh">
      加入官方LINE
    </a>

    <p class="notice">
      加入後輸入「我要了解」即可取得完整資訊。
    </p>
  </div>
</section>

<div class="footer">
  © 2026 BLACKDOMAIN AI. All Rights Reserved.
</div>

</body>
</html>
